<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RennenSP — Racing Simulator</title>
    <meta name="description" content="A realistic 3D browser-based racing simulator with peer-to-peer multiplayer." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body>
    <div id="app">
      <div id="debug-log" style="position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 12px; padding: 10px; z-index: 10000; border-radius: 5px; pointer-events: none; line-height: 1.4;"></div>
      <canvas id="render-canvas"></canvas>
      <div id="hud-overlay">
        <div id="hud-title">
          <span class="title-rennen">RENNEN</span><span class="title-sp">SP</span>
        </div>
        <div id="hud-controls">
          <div class="control-row"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> <span>Move</span></div>
          <div class="control-row"><kbd>Shift</kbd> <span>Sprint</span></div>
          <div class="control-row"><kbd>RMB</kbd> <span>Look around</span></div>
          <div class="control-row"><kbd>Scroll</kbd> <span>Adjust speed</span></div>
        </div>
        <div id="hud-dashboard">
          <div id="rpm-container">
            <div id="rpm-bar-track">
              <div id="rpm-bar-fill"></div>
            </div>
            <div id="rpm-text-container">
              <span id="rpm-value">0</span>
              <span id="rpm-unit">rpm</span>
            </div>
          </div>
          <div id="dashboard-row">
            <div id="gear-container">
              <span id="gear-value">1</span>
            </div>
            <div id="speed-container">
              <span id="speed-value">0</span>
              <span id="speed-unit">km/h</span>
            </div>
          </div>
        </div>
        <div id="hud-position">
          <span id="pos-x">X: 0.0</span>
          <span id="pos-y">Y: 0.0</span>
          <span id="pos-z">Z: 0.0</span>
        </div>
      </div>
      <div id="game-loader-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; font-family: sans-serif;">
          <h2 style="margin-bottom: 10px; letter-spacing: 2px;">RENNEN SP</h2>
          <div id="loading-status-text" style="font-size: 16px; color: #aaa; margin-bottom: 15px;">Initializing track connections...</div>
          <div style="width: 300px; height: 6px; background: #333; border-radius: 3px; overflow: hidden;">
              <div id="loading-progress-bar" style="width: 0%; height: 100%; background: #ff4444; transition: width 0.1s ease;"></div>
          </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
